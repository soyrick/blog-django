{% extends 'base.html' %}
{% block title %}{% if object %}Edit post{% else %}Create post{% endif %} — Community Blog{% endblock %}

{% block content %}
  <div class="mx-auto max-w-3xl rounded-3xl border border-slate-800 bg-slate-900/90 p-6 shadow-2xl shadow-slate-950/20">
    <h1 class="text-3xl font-semibold text-white">{% if object %}Edit post{% else %}New post{% endif %}</h1>
    <form method="post" enctype="multipart/form-data" class="mt-6 space-y-5">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="flex flex-wrap gap-3">
        <button type="submit" class="rounded-full bg-slate-700 px-6 py-2 text-sm text-white transition hover:bg-slate-600">Save</button>
        <a href="{% url 'blog:post_list' %}" class="rounded-full border border-slate-700 px-6 py-2 text-sm text-slate-100 transition hover:border-slate-500">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
