{% extends 'base.html' %}
{% block title %}Register — Community Blog{% endblock %}

{% block content %}
  <div class="mx-auto max-w-md rounded-3xl border border-slate-800 bg-slate-900/90 p-6 shadow-2xl shadow-slate-950/20">
    <h1 class="text-3xl font-semibold text-white">Create an account</h1>
    <form method="post" class="mt-6 space-y-5">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="rounded-full bg-slate-700 px-6 py-2 text-sm text-white transition hover:bg-slate-600">Register</button>
    </form>
    <p class="mt-4 text-sm text-slate-400">Already have an account? <a href="{% url 'accounts:login' %}" class="text-slate-100 underline">Login</a>.</p>
  </div>
{% endblock %}
